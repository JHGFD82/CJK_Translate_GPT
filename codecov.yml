coverage:
  status:
    project:
      default:
        target: 97%          # fail if overall coverage drops below this
        threshold: 1%        # allow up to 1% drop before failing
    patch:
      default:
        target: 85%          # new code in each PR should be ≥85% covered

ignore:
  - "src/**/__init__.py"
  - "src/model_catalog.json"
  - "src/model_catalog.template.json"
  - "data/**"
  - "htmlcov/**"
  - "tests/**"
  - "main.py"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false     # always post a comment on PRs
